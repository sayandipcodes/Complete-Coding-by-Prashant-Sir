<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
  </head>
  <body>
    <table border="1">
      <caption>
        Subjects
      </caption>

      <td colspan="3">Marks</td>
      <td rowspan="2">Student</td>

        <th>Physics</th>
        <th>Chemistry</th>
        <th>Mathematics</th>
      </tr>

      <tr>
        <td>96</td>
        <td>97</td>
        <td>99</td>
      </tr>
    </table>
  </body>
</html>
