<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    
    <!-- Ordered List -->
    <ol>
        <li>Apple</li>
        <li>Mango</li>
        <li>Banana</li>
    </ol>

    <ol type="A">
        <li>Apple</li>
        <li>Mango</li>
        <li>Banana</li>
    </ol>

    <!-- Unordered list -->
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JS</li>
        <ol>
            <li>React</li>
            <li>NextJS</li>

        </ol>
    </ul>




</body>
</html>
